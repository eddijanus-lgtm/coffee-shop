name: Image filename audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/image-audit.yml'
      - 'public/images/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Create labelled contact sheet
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont, ImageOps

          files = sorted([
              *Path('public/images').glob('*.png'),
              *Path('public/images').glob('*.jpg'),
              *Path('public/images').glob('*.jpeg'),
          ])
          assert len(files) >= 10, f'Expected at least 10 images, found {len(files)}'

          cols = 2
          cell_w, cell_h = 620, 500
          thumb_w, thumb_h = 580, 410
          rows = (len(files) + cols - 1) // cols
          sheet = Image.new('RGB', (cols * cell_w, rows * cell_h), 'white')
          draw = ImageDraw.Draw(sheet)
          font_path = '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf'
          font = ImageFont.truetype(font_path, 22)
          small = ImageFont.truetype(font_path, 17)

          for index, path in enumerate(files):
              image = Image.open(path).convert('RGB')
              contained = ImageOps.contain(image, (thumb_w, thumb_h), Image.Resampling.LANCZOS)
              col = index % cols
              row = index // cols
              x = col * cell_w + (cell_w - contained.width) // 2
              y = row * cell_h + 18
              sheet.paste(contained, (x, y))
              label_y = row * cell_h + 438
              draw.text((col * cell_w + 20, label_y), path.name, fill='black', font=font)
              draw.text((col * cell_w + 20, label_y + 30), f'{image.width} × {image.height}', fill='#555555', font=small)
              draw.rectangle((col * cell_w, row * cell_h, (col + 1) * cell_w - 1, (row + 1) * cell_h - 1), outline='#cccccc', width=2)

          Path('audit').mkdir(exist_ok=True)
          sheet.save('audit/image-contact-sheet.jpg', quality=92)
          print('\n'.join(path.name for path in files))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: image-audit
          path: audit/image-contact-sheet.jpg
          if-no-files-found: error

      - name: Record audit run URL
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'image-audit/contact-sheet',
              description: 'Labelled image contact sheet is available',
              target_url: runUrl,
            });
