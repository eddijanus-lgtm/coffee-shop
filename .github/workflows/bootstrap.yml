name: Bootstrap Maison Fleur source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main bootstrap source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify source archive
        shell: bash
        run: |
          set -euo pipefail
          test -s .bootstrap/source.tar.gz
          gzip -t .bootstrap/source.tar.gz
          tar -tzf .bootstrap/source.tar.gz > /dev/null

      - name: Restore complete website source
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf .bootstrap/source.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml
          printf '%s\n' 'node_modules' 'dist' '.DS_Store' '*.local' 'npm-debug.log*' > .gitignore

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate website
        run: |
          npm run lint
          npm run build

      - name: Replace bootstrap commit with website source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Maison Fleur café website with new image gallery"
          git push origin HEAD:main
