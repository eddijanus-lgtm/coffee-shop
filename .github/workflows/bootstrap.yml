name: Bootstrap Maison Fleur source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main bootstrap source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Restore complete website source
        shell: bash
        run: |
          cp .bootstrap/source.tar.gz /tmp/maison-source.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/maison-source.tar.gz -C .
          cat > README.md <<'EOF'
          # Maison Fleur & Café

          Responsive café website based on the Maison Fleur & Café Figma design.

          ## Stack
          - React 19
          - TypeScript
          - Vite
          - Responsive CSS design system
          - GitHub Pages

          ## Local development
          ```bash
          npm install
          npm run dev
          ```

          ## Checks
          ```bash
          npm run lint
          npm run build
          ```
          EOF
          cat > .gitignore <<'EOF'
          node_modules
          dist
          .DS_Store
          *.local
          npm-debug.log*
          EOF

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate website
        run: |
          npm run lint
          npm run build

      - name: Replace bootstrap commit with website source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Maison Fleur café website with new image gallery"
          git push origin HEAD:main
