name: Standalone rendered mapping check

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/render-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Publish run link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'render-check/maison-fleur',
              description: 'Rendering desktop and mobile pages',
              target_url: runUrl,
            });

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render live page
        shell: bash
        run: |
          npm install --no-save --ignore-scripts playwright-core
          mkdir -p render-check
          node <<'JS'
          const { chromium } = require('playwright-core')
          const fs = require('fs')
          const base = 'https://eddijanus-lgtm.github.io/coffee-shop'
          const marker = 'correct-mapping-v3'
          const expected = {
            hero: ['.hero-photo img', '5AC0300D-E665-42A7-92BC-8718279A7FFB.png'],
            feature: ['.feature-dish img', '3BDCD8E5-9FE1-4017-ABBD-0CA8D905B166.png'],
            menu1: ['.menu-card:nth-child(1) img', '4BD19963-EC4F-4BC9-AFD9-260B6A1ED467.png'],
            menu2: ['.menu-card:nth-child(2) img', 'IMG_4392.jpeg'],
            menu3: ['.menu-card:nth-child(3) img', '5371A4A2-A173-45B7-BE7C-D1C92307CAC5.png'],
            moment1: ['.moment-card:nth-child(1) img', 'C41807AE-BD67-48D9-97AB-DB646F1505AF.png'],
            moment2: ['.moment-card:nth-child(2) img', 'E0ED9136-184C-4D77-A64D-16E5AAB8E018.png'],
            moment3: ['.moment-card:nth-child(3) img', '0E29E7A1-D2BC-422D-A488-53D3187AEB93.png'],
            moment4: ['.moment-card:nth-child(4) img', '95F75148-7F42-49FB-8F9A-0E9F24C6904F.png'],
            story: ['.story-photo img', 'C41807AE-BD67-48D9-97AB-DB646F1505AF.png'],
            visit: ['.visit-photo img', '5AC0300D-E665-42A7-92BC-8718279A7FFB.png'],
            reservation: ['.reservation-photo img', '7CD2C2B7-BCEA-4040-847D-FC53A0385218.png'],
          }

          ;(async () => {
            const browser = await chromium.launch({
              executablePath: '/usr/bin/google-chrome',
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage'],
            })
            const audit = {}
            for (const [viewName, viewport] of Object.entries({ desktop: { width: 1440, height: 1200 }, mobile: { width: 390, height: 844 } })) {
              const page = await browser.newPage({ viewport })
              await page.goto(`${base}/?release=${marker}-${Date.now()}`, { waitUntil: 'networkidle', timeout: 120000 })
              const html = await page.content()
              if (!html.includes(marker)) throw new Error(`Live page does not contain ${marker}`)
              await page.waitForFunction(() => [...document.images].every(image => image.complete && image.naturalWidth > 0), null, { timeout: 120000 })
              audit[viewName] = {}
              for (const [key, [selector, file]] of Object.entries(expected)) {
                const src = await page.locator(selector).getAttribute('src')
                if (!src || !src.includes(file)) throw new Error(`${viewName} ${key}: ${src}`)
                audit[viewName][key] = src
              }
              await page.screenshot({ path: `render-check/${viewName}.png`, fullPage: true })
              await page.close()
            }
            fs.writeFileSync('render-check/mapping.json', JSON.stringify(audit, null, 2))
            await browser.close()
          })().catch(error => {
            console.error(error)
            process.exit(1)
          })
          JS

      - uses: actions/upload-artifact@v4
        with:
          name: standalone-render-check
          path: render-check
          if-no-files-found: error

      - name: Publish result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'render-check/maison-fleur',
              description: '${{ job.status }}' === 'success' ? 'Rendered mapping verified' : 'Rendered mapping check failed',
              target_url: runUrl,
            });
