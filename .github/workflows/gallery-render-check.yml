name: Gallery rendered QA

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/gallery-render-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'gallery-render/maison-fleur',
              description: 'Checking equal gallery cards and descriptions',
              target_url: runUrl,
            });

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render and verify gallery
        shell: bash
        run: |
          npm install --no-save --ignore-scripts playwright-core
          mkdir -p gallery-qa
          node <<'JS'
          const { chromium } = require('playwright-core')
          const fs = require('fs')
          const base = 'https://eddijanus-lgtm.github.io/coffee-shop'
          const marker = 'gallery-copy-v4'

          ;(async () => {
            const browser = await chromium.launch({
              executablePath: '/usr/bin/google-chrome',
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage'],
            })
            const report = {}

            for (const [name, viewport] of Object.entries({
              desktop: { width: 1440, height: 1000 },
              mobile: { width: 390, height: 844 },
            })) {
              const page = await browser.newPage({ viewport })
              let live = false
              for (let attempt = 1; attempt <= 24; attempt += 1) {
                await page.goto(`${base}/?release=${marker}-${Date.now()}`, {
                  waitUntil: 'networkidle',
                  timeout: 120000,
                })
                const html = await page.content()
                if (html.includes(marker)) {
                  live = true
                  break
                }
                await page.waitForTimeout(10000)
              }
              if (!live) throw new Error(`${name}: gallery release did not become live`)

              const section = page.locator('.moments-section')
              await section.scrollIntoViewIfNeeded()
              await page.waitForFunction(() => {
                const cards = [...document.querySelectorAll('.moment-card')]
                return cards.length === 4 && cards.every(card => {
                  const image = card.querySelector('img')
                  const title = card.querySelector('.moment-card-title')
                  const description = card.querySelector('.moment-card-description')
                  return image?.complete && image.naturalWidth > 0 && title?.textContent?.trim() && description?.textContent?.trim()
                })
              }, null, { timeout: 120000 })

              const metrics = await page.evaluate(() => {
                const cards = [...document.querySelectorAll('.moment-card')]
                return cards.map(card => {
                  const image = card.querySelector('img')
                  const rect = card.getBoundingClientRect()
                  const imageRect = image.getBoundingClientRect()
                  return {
                    cardWidth: Math.round(rect.width),
                    imageWidth: Math.round(imageRect.width),
                    imageHeight: Math.round(imageRect.height),
                    title: card.querySelector('.moment-card-title')?.textContent?.trim(),
                    description: card.querySelector('.moment-card-description')?.textContent?.trim(),
                  }
                })
              })

              const widths = metrics.map(item => item.imageWidth)
              const heights = metrics.map(item => item.imageHeight)
              if (Math.max(...widths) - Math.min(...widths) > 2) {
                throw new Error(`${name}: gallery image widths differ: ${widths.join(', ')}`)
              }
              if (Math.max(...heights) - Math.min(...heights) > 2) {
                throw new Error(`${name}: gallery image heights differ: ${heights.join(', ')}`)
              }

              report[name] = metrics
              await section.screenshot({ path: `gallery-qa/${name}.png` })
              await page.close()
            }

            fs.writeFileSync('gallery-qa/report.json', JSON.stringify(report, null, 2))
            await browser.close()
          })().catch(error => {
            console.error(error)
            process.exit(1)
          })
          JS

      - uses: actions/upload-artifact@v4
        with:
          name: gallery-rendered-qa
          path: gallery-qa
          if-no-files-found: error

      - name: Publish result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'gallery-render/maison-fleur',
              description: '${{ job.status }}' === 'success' ? 'Equal gallery cards rendered with descriptions' : 'Gallery rendered QA failed',
              target_url: runUrl,
            });
