name: Deploy Maison Fleur website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify source image binaries
        shell: bash
        run: |
          set -euo pipefail
          for image in public/images/barista-interior.webp public/images/brunch-closeup.webp public/images/terrace.webp public/images/window-seat.webp; do
            test -s "$image"
            test "$(head -c 4 "$image")" = "RIFF"
            test "$(dd if="$image" bs=1 skip=8 count=4 status=none)" = "WEBP"
            echo "Verified source image: $image ($(wc -c < "$image") bytes)"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify images inside Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          for image in dist/images/barista-interior.webp dist/images/brunch-closeup.webp dist/images/terrace.webp dist/images/window-seat.webp; do
            test -s "$image"
            test "$(head -c 4 "$image")" = "RIFF"
            test "$(dd if="$image" bs=1 skip=8 count=4 status=none)" = "WEBP"
            echo "Publishing image: $image ($(wc -c < "$image") bytes)"
          done
          grep -q '/coffee-shop/' dist/index.html
          grep -q 'verified-binary-9' dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify the live page and all four public image URLs
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}"
          version="verified-binary-9-${GITHUB_RUN_ID}"

          for attempt in $(seq 1 12); do
            echo "Live verification attempt $attempt"
            success=true

            if ! curl --fail --silent --show-error --location --retry 2 \
              -H 'Cache-Control: no-cache' \
              "$base/?release=$version" -o /tmp/page.html; then
              success=false
            elif ! grep -q 'verified-binary-9' /tmp/page.html; then
              echo 'The newly deployed HTML is not live yet.'
              success=false
            fi

            for name in barista-interior brunch-closeup terrace window-seat; do
              target="/tmp/$name.webp"
              if ! curl --fail --silent --show-error --location --retry 2 \
                -H 'Cache-Control: no-cache' \
                "$base/images/$name.webp?asset=$version" -o "$target"; then
                success=false
                continue
              fi

              if [ "$(head -c 4 "$target")" != 'RIFF' ] || \
                 [ "$(dd if="$target" bs=1 skip=8 count=4 status=none)" != 'WEBP' ]; then
                echo "Invalid live image response for $name"
                success=false
              else
                echo "Live image verified: $name ($(wc -c < "$target") bytes)"
              fi
            done

            if [ "$success" = true ]; then
              echo 'The published website and all four images are live and valid.'
              exit 0
            fi

            sleep 10
          done

          echo 'Live verification failed after all retries.'
          exit 1

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy, verify-live]
    steps:
      - name: Record deployment status
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          LIVE_RESULT: ${{ needs.verify-live.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const success = process.env.BUILD_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success' && process.env.LIVE_RESULT === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'github-pages/maison-fleur',
              description: success ? 'Page and all four live image URLs verified' : 'Page or live image verification failed',
              target_url: success && process.env.PAGE_URL ? process.env.PAGE_URL : runUrl,
            });