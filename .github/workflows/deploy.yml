name: Deploy Maison Fleur website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  IMAGE_RELEASE: correct-mapping-v3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - name: Verify corrected mapping build
        run: |
          grep -q "$IMAGE_RELEASE" dist/index.html
          ! grep -q 'images.unsplash.com' dist/index.html
          test -s dist/images/5AC0300D-E665-42A7-92BC-8718279A7FFB.png
          test -s dist/images/3BDCD8E5-9FE1-4017-ABBD-0CA8D905B166.png
          test -s dist/images/C41807AE-BD67-48D9-97AB-DB646F1505AF.png
          test -s dist/images/95F75148-7F42-49FB-8F9A-0E9F24C6904F.png
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const success = process.env.BUILD_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'github-pages/maison-fleur',
              description: success ? 'Correct image mapping published' : 'Pages deployment failed',
              target_url: success && process.env.PAGE_URL ? process.env.PAGE_URL : runUrl,
            });
