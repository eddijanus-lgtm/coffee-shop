name: Deploy Maison Fleur website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Verify generated café images are in the Pages artifact
        run: |
          test -s dist/images/barista-interior.webp
          test -s dist/images/brunch-closeup.webp
          test -s dist/images/terrace.webp
          test -s dist/images/window-seat.webp
          grep -q '/coffee-shop/' dist/index.html
          find dist/images -maxdepth 1 -type f -printf '%f %s bytes\n'
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy]
    steps:
      - name: Record deployment status
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const success = process.env.BUILD_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'github-pages/maison-fleur',
              description: success ? 'Maison Fleur and all image assets are published' : 'Maison Fleur deployment failed',
              target_url: success && process.env.PAGE_URL ? process.env.PAGE_URL : runUrl,
            });
