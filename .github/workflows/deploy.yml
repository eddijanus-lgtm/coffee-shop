name: Deploy Maison Fleur website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  IMAGE_RELEASE: exact-uploaded-ten-abbefdbc

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify the ten uploaded source images
        shell: bash
        run: |
          set -euo pipefail
          files=(
            '0E29E7A1-D2BC-422D-A488-53D3187AEB93.png'
            '3BDCD8E5-9FE1-4017-ABBD-0CA8D905B166.png'
            '4BD19963-EC4F-4BC9-AFD9-260B6A1ED467.png'
            '5371A4A2-A173-45B7-BE7C-D1C92307CAC5.png'
            '5AC0300D-E665-42A7-92BC-8718279A7FFB.png'
            '7CD2C2B7-BCEA-4040-847D-FC53A0385218.png'
            '95F75148-7F42-49FB-8F9A-0E9F24C6904F.png'
            'C41807AE-BD67-48D9-97AB-DB646F1505AF.png'
            'E0ED9136-184C-4D77-A64D-16E5AAB8E018.png'
            'IMG_4392.jpeg'
          )
          for file_name in "${files[@]}"; do
            image="public/images/$file_name"
            test -s "$image"
            mime="$(file --brief --mime-type "$image")"
            case "$mime" in
              image/png|image/jpeg) ;;
              *) echo "Invalid source image $file_name: $mime"; exit 1 ;;
            esac
            echo "Source verified: $file_name ($mime, $(wc -c < "$image") bytes)"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify the exact image release inside the Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          grep -q "$IMAGE_RELEASE" dist/index.html
          if grep -q 'images.unsplash.com' dist/index.html; then
            echo 'External Unsplash images are still present.'
            exit 1
          fi
          files=(
            '0E29E7A1-D2BC-422D-A488-53D3187AEB93.png'
            '3BDCD8E5-9FE1-4017-ABBD-0CA8D905B166.png'
            '4BD19963-EC4F-4BC9-AFD9-260B6A1ED467.png'
            '5371A4A2-A173-45B7-BE7C-D1C92307CAC5.png'
            '5AC0300D-E665-42A7-92BC-8718279A7FFB.png'
            '7CD2C2B7-BCEA-4040-847D-FC53A0385218.png'
            '95F75148-7F42-49FB-8F9A-0E9F24C6904F.png'
            'C41807AE-BD67-48D9-97AB-DB646F1505AF.png'
            'E0ED9136-184C-4D77-A64D-16E5AAB8E018.png'
            'IMG_4392.jpeg'
          )
          for file_name in "${files[@]}"; do
            test -s "dist/images/$file_name"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify live HTML and all ten uploaded image URLs
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}"
          files=(
            '0E29E7A1-D2BC-422D-A488-53D3187AEB93.png'
            '3BDCD8E5-9FE1-4017-ABBD-0CA8D905B166.png'
            '4BD19963-EC4F-4BC9-AFD9-260B6A1ED467.png'
            '5371A4A2-A173-45B7-BE7C-D1C92307CAC5.png'
            '5AC0300D-E665-42A7-92BC-8718279A7FFB.png'
            '7CD2C2B7-BCEA-4040-847D-FC53A0385218.png'
            '95F75148-7F42-49FB-8F9A-0E9F24C6904F.png'
            'C41807AE-BD67-48D9-97AB-DB646F1505AF.png'
            'E0ED9136-184C-4D77-A64D-16E5AAB8E018.png'
            'IMG_4392.jpeg'
          )

          for attempt in $(seq 1 18); do
            echo "Live verification attempt $attempt"
            if curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              "$base/?release=$IMAGE_RELEASE-$GITHUB_RUN_ID" -o /tmp/page.html \
              && grep -q "$IMAGE_RELEASE" /tmp/page.html \
              && ! grep -q 'images.unsplash.com' /tmp/page.html; then
              break
            fi
            if [ "$attempt" = 18 ]; then
              echo 'The exact uploaded-image HTML did not become live.'
              exit 1
            fi
            sleep 10
          done

          for file_name in "${files[@]}"; do
            target="/tmp/$file_name"
            curl --fail --silent --show-error --location --retry 3 \
              -H 'Cache-Control: no-cache' \
              "$base/images/$file_name?v=$IMAGE_RELEASE-$GITHUB_RUN_ID" -o "$target"
            test -s "$target"
            mime="$(file --brief --mime-type "$target")"
            case "$mime" in
              image/png|image/jpeg) ;;
              *) echo "Invalid live image $file_name: $mime"; exit 1 ;;
            esac
            echo "Live image verified: $file_name ($mime, $(wc -c < "$target") bytes)"
          done

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy, verify-live]
    steps:
      - name: Record deployment status
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          LIVE_RESULT: ${{ needs.verify-live.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const success = process.env.BUILD_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success' && process.env.LIVE_RESULT === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'github-pages/maison-fleur',
              description: success ? 'All ten uploaded café images are live' : 'Uploaded-image deployment failed',
              target_url: success && process.env.PAGE_URL ? process.env.PAGE_URL : runUrl,
            });
