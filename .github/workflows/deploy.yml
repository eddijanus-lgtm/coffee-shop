name: Deploy Maison Fleur website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify fresh image mapping is inside the Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'photo-1554118811-1e0d58224f24' dist/index.html
          grep -q 'photo-1509042239860-f550ce710b93' dist/index.html
          grep -q 'photo-1521017432531-fbd92d768814' dist/index.html
          grep -q 'photo-1445116572660-236099ec97a0' dist/index.html
          if grep -q "const imageBase = '/coffee-shop/images/'" dist/index.html; then
            echo 'Old broken image rewriter is still present.'
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify live HTML and all fresh image sources
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}"
          release="fresh-images-${GITHUB_RUN_ID}"
          urls=(
            'https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=1600&q=85&fm=jpg'
            'https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1400&q=85&fm=jpg'
            'https://images.unsplash.com/photo-1521017432531-fbd92d768814?auto=format&fit=crop&w=1600&q=85&fm=jpg'
            'https://images.unsplash.com/photo-1445116572660-236099ec97a0?auto=format&fit=crop&w=1400&q=85&fm=jpg'
          )

          for attempt in $(seq 1 12); do
            echo "Live verification attempt $attempt"
            if curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              "$base/?release=$release" -o /tmp/page.html \
              && grep -q 'photo-1554118811-1e0d58224f24' /tmp/page.html \
              && grep -q 'photo-1509042239860-f550ce710b93' /tmp/page.html \
              && grep -q 'photo-1521017432531-fbd92d768814' /tmp/page.html \
              && grep -q 'photo-1445116572660-236099ec97a0' /tmp/page.html; then
              break
            fi

            if [ "$attempt" = 12 ]; then
              echo 'The newly deployed HTML did not become live.'
              exit 1
            fi
            sleep 10
          done

          index=0
          for url in "${urls[@]}"; do
            index=$((index + 1))
            target="/tmp/cafe-image-$index.jpg"
            curl --fail --silent --show-error --location --retry 3 "$url" -o "$target"
            test -s "$target"
            mime="$(file --brief --mime-type "$target")"
            case "$mime" in
              image/jpeg|image/webp|image/avif) ;;
              *) echo "Unexpected image MIME type: $mime"; exit 1 ;;
            esac
            echo "Fresh image $index verified: $mime ($(wc -c < "$target") bytes)"
          done

  report:
    if: always()
    runs-on: ubuntu-latest
    needs: [build, deploy, verify-live]
    steps:
      - name: Record deployment status
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          LIVE_RESULT: ${{ needs.verify-live.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const success = process.env.BUILD_RESULT === 'success' && process.env.DEPLOY_RESULT === 'success' && process.env.LIVE_RESULT === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'github-pages/maison-fleur',
              description: success ? 'Fresh café images verified on the live page' : 'Fresh image deployment failed',
              target_url: success && process.env.PAGE_URL ? process.env.PAGE_URL : runUrl,
            });
