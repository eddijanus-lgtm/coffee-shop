<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/coffee-shop/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf5f1" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta property="og:title" content="Maison Fleur & Café · Paris" />
    <meta property="og:description" content="Coffee, flowers and slow mornings in Le Marais." />
    <meta property="og:image" content="https://eddijanus-lgtm.github.io/coffee-shop/images/terrace.webp?v=20260715-4" />
    <meta name="description" content="Maison Fleur & Café — coffee, flowers and slow mornings in Le Marais, Paris." />
    <title>Maison Fleur & Café · Paris</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const imageBase = '/coffee-shop/images/'
        const imageVersion = '20260715-4'
        const rewriteImage = (image) => {
          const rawSource = image.getAttribute('src') || ''
          if (!rawSource.includes('images/')) return
          const fileName = rawSource.split('/').pop().split('?')[0]
          if (!fileName) return
          const target = `${imageBase}${fileName}?v=${imageVersion}`
          if (image.getAttribute('src') !== target) image.setAttribute('src', target)
        }
        const rewriteAllImages = (root = document) => {
          root.querySelectorAll?.('img').forEach(rewriteImage)
          if (root instanceof HTMLImageElement) rewriteImage(root)
        }
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === 'attributes' && mutation.target instanceof HTMLImageElement) {
              rewriteImage(mutation.target)
              return
            }
            mutation.addedNodes.forEach((node) => {
              if (node instanceof Element) rewriteAllImages(node)
            })
          })
        })
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['src'],
        })
        window.addEventListener('DOMContentLoaded', () => rewriteAllImages())
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
