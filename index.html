<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/coffee-shop/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbf5f1" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./gallery-v4.css?v=gallery-copy-v4-2" />
    <meta property="og:title" content="Maison Fleur & Café · Paris" />
    <meta property="og:description" content="Coffee, flowers and slow mornings in Le Marais." />
    <meta property="og:image" content="https://eddijanus-lgtm.github.io/coffee-shop/images/5AC0300D-E665-42A7-92BC-8718279A7FFB.png?v=correct-mapping-v3" />
    <meta name="description" content="Maison Fleur & Café — coffee, flowers and slow mornings in Le Marais, Paris." />
    <meta name="maison-image-release" content="story-cafe-v1" />
    <meta name="maison-gallery-release" content="gallery-copy-v4" />
    <title>Maison Fleur & Café · Paris</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const deploymentMarker = 'story-cafe-v1'
        const assetVersion = 'story-cafe-v1-20260715'
        const galleryVersion = 'gallery-copy-v4'
        const assignments = [
          { selector: '.hero-photo img', file: '5AC0300D-E665-42A7-92BC-8718279A7FFB.png', eager: true },
          { selector: '.feature-dish img', file: '3BDCD8E5-9FE1-4017-ABBD-0CA8D905B166.png', eager: true },
          { selector: '.menu-card:nth-child(1) img', file: '4BD19963-EC4F-4BC9-AFD9-260B6A1ED467.png' },
          { selector: '.menu-card:nth-child(2) img', file: 'IMG_4392.jpeg' },
          { selector: '.menu-card:nth-child(3) img', file: '5371A4A2-A173-45B7-BE7C-D1C92307CAC5.png' },
          { selector: '.moment-card:nth-child(1) img', file: 'C41807AE-BD67-48D9-97AB-DB646F1505AF.png', eager: true },
          { selector: '.moment-card:nth-child(2) img', file: 'E0ED9136-184C-4D77-A64D-16E5AAB8E018.png', eager: true },
          { selector: '.moment-card:nth-child(3) img', file: '0E29E7A1-D2BC-422D-A488-53D3187AEB93.png', eager: true },
          { selector: '.moment-card:nth-child(4) img', file: '95F75148-7F42-49FB-8F9A-0E9F24C6904F.png', eager: true },
          { selector: '.story-photo img', file: 'story-cafe.webp', eager: true },
          { selector: '.visit-photo img', file: '5AC0300D-E665-42A7-92BC-8718279A7FFB.png' },
          { selector: '.reservation-photo img', file: '7CD2C2B7-BCEA-4040-847D-FC53A0385218.png' },
        ]
        const galleryCopy = [
          {
            title: 'Behind the bar',
            description: 'Our espresso bar starts early, with fresh pastries, quiet preparation and the first carefully poured cups of the day.',
          },
          {
            title: 'Brunch, slowly',
            description: 'Warm pastries, seasonal fruit and coffee made for long conversations rather than hurried mornings.',
          },
          {
            title: 'A table outside',
            description: 'The terrace is our favourite place for brunch in the soft Paris morning light, surrounded by flowers.',
          },
          {
            title: 'The quiet corner',
            description: 'A sunny window seat for one more cappuccino, a newspaper and nowhere else you need to be.',
          },
        ]

        const imageUrl = (file) => new URL(`images/${file}?v=${assetVersion}`, document.baseURI).href

        const enhanceGallery = () => {
          document.querySelectorAll('.moment-card').forEach((card, index) => {
            const copy = galleryCopy[index]
            const caption = card.querySelector('figcaption')
            if (!copy || !caption) return
            if (
              caption.dataset.galleryCopy === galleryVersion
              && caption.querySelector('.moment-card-title')
              && caption.querySelector('.moment-card-description')
            ) return

            caption.dataset.galleryCopy = galleryVersion
            caption.replaceChildren()

            const title = document.createElement('h3')
            title.className = 'moment-card-title'
            title.textContent = copy.title

            const description = document.createElement('p')
            description.className = 'moment-card-description'
            description.textContent = copy.description

            caption.append(title, description)
          })
          document.documentElement.dataset.maisonGallery = galleryVersion
        }

        const applyImages = () => {
          let found = 0
          for (const assignment of assignments) {
            const image = document.querySelector(assignment.selector)
            if (!image) continue
            found += 1
            const target = imageUrl(assignment.file)
            if (image.dataset.maisonDirectFile === assignment.file && image.src === target) continue
            image.dataset.maisonDirectFile = assignment.file
            image.removeAttribute('srcset')
            image.decoding = 'async'
            image.loading = assignment.eager ? 'eager' : 'lazy'
            if (assignment.eager) image.fetchPriority = 'high'
            image.src = target
          }
          enhanceGallery()
          if (found === assignments.length) {
            document.documentElement.dataset.maisonImages = deploymentMarker
          }
        }

        let frame = 0
        const scheduleApply = () => {
          if (frame) return
          frame = requestAnimationFrame(() => {
            frame = 0
            applyImages()
          })
        }

        const observer = new MutationObserver(scheduleApply)
        observer.observe(document.documentElement, { childList: true, subtree: true })
        window.addEventListener('DOMContentLoaded', scheduleApply, { once: true })
        scheduleApply()
        setTimeout(scheduleApply, 100)
        setTimeout(scheduleApply, 500)
        setTimeout(scheduleApply, 1500)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
